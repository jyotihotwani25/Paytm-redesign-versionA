<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paytm — Scan QR</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #111; }
    .scan-page { background: #111; min-height: 100vh; display: flex; flex-direction: column; }
    .scan-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px;
      background: transparent;
    }
    .scan-back {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.12);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .scan-back svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .scan-title { font-size: 16px; font-weight: 600; color: #fff; }
    .scan-tabs {
      display: flex; background: rgba(255,255,255,.1); border-radius: 8px; padding: 4px;
      margin-top: 12px; width: fit-content; align-self: center;
    }
  </style>
</head>
<body>
<div class="scan-page">

  <!-- Header -->
  <header class="scan-header">
    <a href="index.html" class="scan-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="scan-title">Scan QR Code</span>
  </header>

  <!-- Tabs -->
  <div style="display:flex;justify-content:center;padding:4px 0 0;">
    <div class="scan-tabs">
      <div class="scan-tab active" onclick="switchTab(this)">Scan</div>
      <div class="scan-tab" onclick="switchTab(this)">My QR</div>
    </div>
  </div>

  <!-- Scan view -->
  <div id="scanView" class="scan-bg" style="flex:1;">
    <!-- Simulated camera feed -->
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 100%);display:flex;align-items:center;justify-content:center;">
      <!-- grid pattern simulating camera -->
      <div style="position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.5) 39px,rgba(255,255,255,.5) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.5) 39px,rgba(255,255,255,.5) 40px);"></div>
    </div>

    <!-- Frame -->
    <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;">
      <div class="scan-frame">
        <div class="sf-corner sf-tl"></div>
        <div class="sf-corner sf-tr"></div>
        <div class="sf-corner sf-br"></div>
        <div class="sf-corner sf-bl"></div>
        <div class="scan-line"></div>
      </div>
      <p class="scan-hint">Point camera at any QR code to pay</p>

      <!-- Actions -->
      <div class="scan-actions" style="margin-top:36px;">
        <div class="scan-action" onclick="toggleTorch()">
          <div class="scan-action-icon" id="torchBtn">
            <svg viewBox="0 0 24 24"><path d="M9 7h6l-1 7H10L9 7z"/><path d="M9 17h6v2a1 1 0 01-1 1h-4a1 1 0 01-1-1v-2z"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="19.78" y1="4.22" x2="18.36" y2="5.64"/></svg>
          </div>
          <span class="scan-action-label">Torch</span>
        </div>

        <div class="scan-action" onclick="openGallery()">
          <div class="scan-action-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </div>
          <span class="scan-action-label">Gallery</span>
        </div>

        <div class="scan-action" onclick="enterManual()">
          <div class="scan-action-icon">
            <svg viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          </div>
          <span class="scan-action-label">Enter UPI</span>
        </div>
      </div>
    </div>
  </div>

  <!-- My QR view (hidden by default) -->
  <div id="myQrView" style="display:none;flex:1;background:var(--ink-050);padding:24px 20px;align-items:center;flex-direction:column; overflow-y: scroll;">
    <div style="background:var(--white);border-radius:16px;padding:20px;text-align:center;width:100%;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid var(--ink-100);">
      <!-- User info -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--ink-100);">
        <div class="av av-44 c1">RK</div>
        <div style="flex:1;"><div style="font-size:15px;font-weight:600;color:var(--ink-900);">Rahul Khatri</div><div style="font-size:12px;color:var(--ink-300);margin-top:2px;">HDFC Bank &middot; AC &middot;&middot;&middot;8821</div></div>
        <span class="badge badge-green">Verified</span>
      </div>
      <div style="text-align:center;">
        <div style="width:170px;height:170px;margin:0 auto;border:3px solid var(--blue);border-radius:14px;padding:12px;display:flex;align-items:center;justify-content:center;">
          <svg width="138" height="138" viewBox="0 0 140 140" fill="none">
            <rect x="0" y="0" width="42" height="42" rx="4" fill="#0D1117"/><rect x="8" y="8" width="26" height="26" fill="white"/><rect x="13" y="13" width="16" height="16" fill="#0D1117"/>
            <rect x="98" y="0" width="42" height="42" rx="4" fill="#0D1117"/><rect x="106" y="8" width="26" height="26" fill="white"/><rect x="111" y="13" width="16" height="16" fill="#0D1117"/>
            <rect x="0" y="98" width="42" height="42" rx="4" fill="#0D1117"/><rect x="8" y="106" width="26" height="26" fill="white"/><rect x="13" y="111" width="16" height="16" fill="#0D1117"/>
            <rect x="48" y="4" width="6" height="6" rx="1" fill="#0D1117"/><rect x="58" y="4" width="6" height="6" rx="1" fill="#0D1117"/><rect x="70" y="10" width="6" height="6" rx="1" fill="#0D1117"/><rect x="80" y="4" width="6" height="6" rx="1" fill="#0D1117"/>
            <rect x="4" y="48" width="6" height="6" rx="1" fill="#0D1117"/><rect x="14" y="58" width="6" height="6" rx="1" fill="#0D1117"/><rect x="4" y="68" width="6" height="6" rx="1" fill="#0D1117"/><rect x="24" y="58" width="6" height="6" rx="1" fill="#0D1117"/>
            <rect x="52" y="52" width="12" height="12" rx="2" fill="#00BAF2"/>
            <rect x="68" y="48" width="6" height="6" rx="1" fill="#0D1117"/><rect x="80" y="56" width="6" height="6" rx="1" fill="#0D1117"/><rect x="94" y="48" width="6" height="6" rx="1" fill="#0D1117"/><rect x="108" y="52" width="6" height="6" rx="1" fill="#0D1117"/>
            <rect x="48" y="68" width="6" height="6" rx="1" fill="#0D1117"/><rect x="60" y="78" width="6" height="6" rx="1" fill="#0D1117"/><rect x="74" y="68" width="6" height="6" rx="1" fill="#0D1117"/><rect x="88" y="76" width="6" height="6" rx="1" fill="#0D1117"/>
            <rect x="48" y="100" width="6" height="6" rx="1" fill="#0D1117"/><rect x="62" y="110" width="6" height="6" rx="1" fill="#0D1117"/><rect x="74" y="100" width="6" height="6" rx="1" fill="#0D1117"/><rect x="86" y="114" width="6" height="6" rx="1" fill="#0D1117"/><rect x="100" y="100" width="6" height="6" rx="1" fill="#0D1117"/><rect x="112" y="110" width="6" height="6" rx="1" fill="#0D1117"/>
          </svg>
        </div>
        <div style="font-size:12px;color:var(--ink-300);margin-top:10px;">Ask them to scan to pay you</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;background:var(--ink-050);border-radius:var(--radius-sm);padding:12px 14px;margin-top:16px;">
        <div><div style="font-size:10px;color:var(--ink-300);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;">UPI ID</div><div style="font-size:14px;font-weight:600;color:var(--ink-900);">rahul.khatri@okhdfc</div></div>
        <button id="upiCopyBtn" onclick="doCopyUpi()" style="font-size:13px;font-weight:600;color:var(--blue);background:none;border:none;cursor:pointer;">Copy</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;">
        <button class="btn btn-ghost btn-full" style="gap:6px;font-size:13px;"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share</button>
        <button class="btn btn-outline btn-full" style="gap:6px;font-size:13px;"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button>
      </div>
    </div>
  </div>

  <!-- Bottom tray (scan mode) -->
  <div id="scanTray" style="background:#1a1a1a;padding:16px 20px 28px;">
    <p style="font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;">Pay via UPI apps</p>
    <div style="display:flex;justify-content:center;gap:20px;align-items:center;">
      <div style="text-align:center;">
        <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.1);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.6"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </div>
        <span style="font-size:10px;color:rgba(255,255,255,.4);">Paytm</span>
      </div>
      <div style="text-align:center;">
        <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.1);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </div>
        <span style="font-size:10px;color:rgba(255,255,255,.4);">PhonePe</span>
      </div>
      <div style="text-align:center;">
        <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.1);margin:0 auto 4px;display:flex;align-items:center;justify-content:center;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.6"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        </div>
        <span style="font-size:10px;color:rgba(255,255,255,.4);">BHIM</span>
      </div>
    </div>
  </div>

</div>

<!-- Manual UPI sheet -->
<div id="manualSheet" style="display:none;position:fixed;inset:0;z-index:500;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.55);" onclick="closeManual()"></div>
  <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-radius:20px 20px 0 0;padding:20px 20px 32px;">
    <div style="display:flex;justify-content:center;margin-bottom:16px;"><div style="width:36px;height:4px;background:var(--ink-100);border-radius:2px;"></div></div>
    <div style="font-size:16px;font-weight:600;color:var(--ink-900);margin-bottom:16px;">Enter UPI ID</div>
    <div class="input-wrap">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/></svg>
      <input class="input" type="text" placeholder="e.g. name@upi" id="manualUpi">
    </div>
    <button class="btn btn-primary btn-full mt-16" onclick="verifyUpi()">Verify &amp; Continue</button>
  </div>
</div>

<script src="script.js"></script>
<script>

let torchOn = false;

function switchTab(el) {
  document.querySelectorAll('.scan-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const isMyQr = el.textContent === 'My QR';
  document.getElementById('scanView').style.display  = isMyQr ? 'none' : 'flex';
  document.getElementById('myQrView').style.display  = isMyQr ? 'flex' : 'none';
  document.getElementById('scanTray').style.display  = isMyQr ? 'none' : 'block';
}

function toggleTorch() {
  torchOn = !torchOn;
  const btn = document.getElementById('torchBtn');
  btn.style.background = torchOn ? 'rgba(255,214,0,.25)' : 'rgba(255,255,255,.1)';
}

function openGallery() {
  // simulate picking from gallery → go to success
  sessionStorage.setItem('payee', 'QR Payment');
  sessionStorage.setItem('upi', 'merchant@upi');
  sessionStorage.setItem('payAmount', '250');
  sessionStorage.setItem('payNote', 'QR Scan');
  window.location = 'payment-success.html';
}

function enterManual() {
  document.getElementById('manualSheet').style.display = 'block';
}
function closeManual() {
  document.getElementById('manualSheet').style.display = 'none';
}
function verifyUpi() {
  const v = document.getElementById('manualUpi').value.trim();
  if (!v || !v.includes('@')) {
    document.getElementById('manualUpi').style.borderColor = 'var(--red)';
    return;
  }
  sessionStorage.setItem('payee', v);
  sessionStorage.setItem('upi', v);
  closeManual();
  window.location = 'pay.html';
}
</script>
</body>
</html>
