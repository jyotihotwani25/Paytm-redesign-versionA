<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paytm — Payment Successful</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .check-anim { animation: popIn .35s cubic-bezier(.175,.885,.32,1.275) both; }
    @keyframes popIn { from{opacity:0;transform:scale(.4)} to{opacity:1;transform:scale(1)} }
    .detail-row { display:flex; justify-content:space-between; align-items:center; padding: 12px 0; }
    .detail-row + .detail-row { border-top: 1px solid var(--ink-100); }
    .detail-label { font-size:13px; color:var(--ink-300); }
    .detail-value { font-size:13px; font-weight:500; color:var(--ink-900); }
    .upi-ref { font-family: 'DM Sans', monospace; font-size:12px; color:var(--ink-500); letter-spacing:.3px; }
  </style>
</head>
<body>
<div class="page" style="background:var(--white);">

  <!-- Header -->
  <header class="page-header">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="page-header-title">Payment Successful</span>
    <div class="page-header-right">
      <button class="icon-btn">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>
  </header>

  <!-- Success block -->
  <div style="padding: 32px 20px 0; text-align:center;" class="fu">
    <div class="success-circle check-anim">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div style="font-size:14px;color:var(--ink-300);margin-top:14px;font-weight:500;">Money sent successfully</div>
    <div id="displayAmount" style="font-size:44px;font-weight:600;color:var(--ink-900);letter-spacing:-1.5px;margin-top:8px;line-height:1;">&#8377;6,500</div>
    <div id="displayNote" style="font-size:13px;color:var(--ink-300);margin-top:6px;">Money Transfer</div>
  </div>

  <!-- Recipient + Sender -->
  <div class="section mt-24 fu fu1">
    <div class="card card-pad">
      <!-- To -->
      <div style="display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--ink-100);">
        <div class="av av-44 c1" id="recipientAvatar">KD</div>
        <div>
          <div style="font-size:11px;color:var(--ink-300);font-weight:500;letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px;">To</div>
          <div style="font-size:15px;font-weight:600;color:var(--ink-900);" id="recipientName">K Deepakkumar</div>
          <div style="font-size:12px;color:var(--ink-300);margin-top:2px;" id="recipientUpi">9898104191@kotak</div>
        </div>
        <div style="margin-left:auto;">
          <span class="badge badge-green">Verified</span>
        </div>
      </div>

      <!-- From -->
      <div style="display:flex;align-items:center;gap:12px;padding-top:14px;">
        <div class="av av-44 c1">RK</div>
        <div>
          <div style="font-size:11px;color:var(--ink-300);font-weight:500;letter-spacing:.3px;text-transform:uppercase;margin-bottom:3px;">From</div>
          <div style="font-size:15px;font-weight:600;color:var(--ink-900);">Rahul Khatri</div>
          <div style="font-size:12px;color:var(--ink-300);margin-top:2px;">rahul.khatri@okhdfc · Bank of India</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transaction details -->
  <div class="section mt-16 fu fu2">
    <div class="card card-pad">
      <div class="detail-row">
        <span class="detail-label">Date &amp; time</span>
        <span class="detail-value" id="txnDate">31 Mar 2026 · 11:37 AM</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">UPI Reference</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="upi-ref" id="upiRef">399888032160</span>
          <button id="copyBtn" onclick="doCopy()" style="font-size:12px;font-weight:600;color:var(--blue);background:none;border:none;cursor:pointer;">Copy</button>
        </div>
      </div>
      <div class="detail-row">
        <span class="detail-label">Payment method</span>
        <span class="detail-value">Bank of India · UPI</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span style="font-size:13px;font-weight:600;color:var(--green);display:flex;align-items:center;gap:5px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Successful
        </span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="section mt-16 fu fu3" style="padding-bottom:0;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button class="btn btn-ghost btn-full" onclick="window.location='pay.html'">Pay Again</button>
      <button class="btn btn-ghost btn-full" onclick="window.location='history.html'">View History</button>
    </div>
    <button class="btn btn-primary btn-full mt-12" onclick="window.location='index.html'">Back to Home</button>
  </div>

  <div class="spacer"></div>
</div>

<script src="script.js"></script>
<script>
renderNav('home');

// Populate from session
const amt     = sessionStorage.getItem('payAmount')  || '6500';
const payee   = sessionStorage.getItem('payee')       || 'K Deepakkumar';
const upi     = sessionStorage.getItem('upi')         || '9898104191@kotak';
const note    = sessionStorage.getItem('payNote')     || 'Money Transfer';

document.getElementById('displayAmount').textContent = '\u20B9' + Number(amt).toLocaleString('en-IN');
document.getElementById('displayNote').textContent   = note;
document.getElementById('recipientName').textContent = payee;
document.getElementById('recipientUpi').textContent  = upi;

// Avatar initials
const initials = payee.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
document.getElementById('recipientAvatar').textContent = initials;

// Date
const now = new Date();
document.getElementById('txnDate').textContent =
  now.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) + ' · ' +
  now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});

// UPI ref
const ref = String(Math.floor(Math.random()*900000000000 + 100000000000));
document.getElementById('upiRef').textContent = ref;

function doCopy() {
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(ref).then(() => {
    btn.textContent = 'Copied';
    btn.style.color = 'var(--green)';
    setTimeout(()=>{ btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
  });
}
</script>
</body>
</html>
